version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_password123}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_password123}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      SECRET_KEY: ${SECRET_KEY:-cambia_esto_por_una_clave_segura_larga}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      CORS_ORIGINS: "*"
    volumes:
      - uploads:/app/uploads
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  # =========================================================================
  # Servicio de Backup Automático
  # Ejecuta pg_dump + backup de uploads diariamente a las 2:00 AM
  # Mantiene los últimos 30 días de backups
  # =========================================================================
  backup:
    build: ./backup
    restart: unless-stopped
    depends_on:
      - db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_password123}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      BACKUP_SCHEDULE: "${BACKUP_SCHEDULE:-0 2 * * *}"
      RETENTION_DAYS: "${RETENTION_DAYS:-30}"
    volumes:
      - ./data/backups:/backups
      - uploads:/app/uploads:ro

volumes:
  uploads:
